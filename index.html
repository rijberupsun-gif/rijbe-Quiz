<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Vocabulary Quiz App</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f3f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .app-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 5px; }
        .subtitle { color: #7f8c8d; font-size: 14px; margin-bottom: 20px; }
        .selector-box {
            margin-bottom: 25px;
            background-color: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }
        .selector-box label {
            font-size: 13px;
            font-weight: bold;
            color: #34495e;
            margin-right: 10px;
        }
        select {
            padding: 6px 12px;
            font-size: 14px;
            border-radius: 4px;
            border: 1px solid #bdc3c7;
            outline: none;
            cursor: pointer;
        }
        .word-card {
            font-size: 38px;
            font-weight: bold;
            color: #2c3e50;
            margin: 20px 0;
            background-color: #f8f9fa;
            padding: 25px;
            border-radius: 8px;
            border: 2px solid #e9ecef;
            min-height: 50px;
        }
        input[type="text"] {
            width: 85%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            outline: none;
            margin-bottom: 15px;
            text-align: center;
        }
        input[type="text"]:focus { border-color: #3498db; }
        button.main-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        button.main-btn:hover { background-color: #2980b9; }
        .feedback {
            margin-top: 15px;
            font-size: 16px;
            font-weight: bold;
            min-height: 25px;
        }
        .correct { color: #2ecc71; }
        .incorrect { color: #e74c3c; }
        .progress { font-size: 13px; color: #7f8c8d; margin-top: 15px; font-weight: bold; }
        .improvement-box {
            text-align: left;
            background: #fff5f5;
            padding: 15px;
            border-left: 5px solid #e74c3c;
            border-radius: 6px;
            margin-top: 25px;
            display: none;
        }
        .improvement-box h3 { color: #c0392b; margin-top: 0; font-size: 18px; }
        .improvement-box ul { padding-left: 20px; margin-bottom: 0; }
        .improvement-box li { margin-bottom: 8px; color: #2c3e50; font-size: 15px; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>Japanese Quiz App</h1>
    <p class="subtitle">Type the English meaning and press Enter or Submit</p>

    <div class="selector-box">
        <label for="lesson-select">Choose Lesson:</label>
        <select id="lesson-select" onchange="resetQuizState()">
            <option value="all">All Lessons (Mixed)</option>
            <option value="1">Lesson 1 Only</option>
            <option value="2">Lesson 2 Only</option>
            <option value="3">Lesson 3 Only</option>
             <option value="4">Lesson 4 Only</option>
            <option value="5">Lesson 5 Only</option>
            <option value="6">Lesson 6 Only</option>
            <option value="7">Lesson 7 Only</option>
            <option value="8">Lesson 8 Only</option>
            <option value="9">Lesson 9 Only</option>
            <option value="10">Lesson 10 Only</option>
        </select>
    </div>

    <div class="word-card" id="target-word">Loading...</div>
    
    <input type="text" id="input-ans" placeholder="Type answer here..." autocomplete="off">
    <br>
    <button class="main-btn" id="btn-submit" onclick="verifyInput()">Submit</button>

    <div class="feedback" id="msg-feedback"></div>
    <div class="progress" id="msg-progress"></div>

    <div class="improvement-box" id="box-improve">
        <h3>📝 Improvement List (Review words):</h3>
        <ul id="list-wrong-words"></ul>
        <button id="btn-reset" style="margin-top:15px; background:#2ecc71; color:white; border:none; padding:8px 15px; border-radius:4px; cursor:pointer; font-weight:bold;" onclick="resetQuizState()">Restart Quiz</button>
    </div>
</div>

    let activeWords = [];
    let position = 0;
    let flawsList = [];
    let lockInput = false;

    function resetQuizState() {
        const selectedSelection = document.getElementById("lesson-select").value;
        if (selectedSelection === "all") {
            activeWords = [...vocabularyList];
        } else {
            activeWords = vocabularyList.filter(item => item.lesson === selectedSelection);
        }
        activeWords.sort(() => 0.5 - Math.random());
        position = 0;
        flawsList = [];
        lockInput = false;
        document.getElementById("box-improve").style.display = "none";
        document.getElementById("list-wrong-words").innerHTML = "";
        document.getElementById("msg-feedback").innerText = "";
        document.getElementById("input-ans").disabled = false;
        document.getElementById("btn-submit").disabled = false;
        displayWordElement();
    }

    function displayWordElement() {
        if (position < activeWords.length) {
            document.getElementById("target-word").innerText = activeWords[position].jp;
            document.getElementById("input-ans").value = "";
            document.getElementById("msg-feedback").innerText = "";
            renderProgressLabel();
            setTimeout(() => { document.getElementById("input-ans").focus(); }, 50);
        } else {
            terminateQuizSession();
        }
    }

    function renderProgressLabel() {
        if (activeWords.length > 0) {
            if (position < activeWords.length) {
                document.getElementById("msg-progress").innerText = `Word ${position + 1} of ${activeWords.length}`;
            } else {
                document.getElementById("msg-progress").innerText = "Quiz Finished!";
            }
        }
    }

    function verifyInput() {
        if (lockInput) return;
        const userInput = document.getElementById("input-ans").value.trim().toLowerCase();
        if (userInput === "") return;
        lockInput = true;
        const currentItem = activeWords[position];
        const matchFound = currentItem.en.map(v => v.toLowerCase()).includes(userInput);
        const feed = document.getElementById("msg-feedback");
        if (matchFound) {
            feed.innerText = "✓ Correct Answer!";
            feed.className = "feedback correct";
        } else {
            feed.innerText = `✗ Wrong! Correct target: ${currentItem.en.join(' or ')}`;
            feed.className = "feedback incorrect";
            if (!flawsList.includes(currentItem)) { flawsList.push(currentItem); }
        }
        position++;
        setTimeout(() => { lockInput = false; displayWordElement(); }, 1800);
    }

       function terminateQuizSession() {
        document.getElementById("input-ans").disabled = true;
        document.getElementById("btn-submit").disabled = true;
        document.getElementById("target-word").innerText = "🎉";
        renderProgressLabel();

        const box = document.getElementById("box-improve");
        const ul = document.getElementById("list-wrong-words");
        box.style.display = "block";
        ul.innerHTML = "";

        // Check which lesson is currently selected in the dropdown
        const currentLesson = document.getElementById("lesson-select").value;

        // Base completion message
        let summaryHtml = `<h4>Quiz Completed for Lesson: ${currentLesson.toUpperCase()}</h4>`;
        
        if (flawsList.length === 0) {
            summaryHtml += '<p style="color:#2ecc71; font-weight:bold; text-align:center; margin:0;">🎉 Perfect Score! No words to improve. Awesome job!</p>';
        } else {
            summaryHtml += '<p style="color:#e74c3c; font-weight:bold;">Review these words to improve:</p><ul>';
            flawsList.forEach(item => {
                summaryHtml += `<li><strong>${item.jp}</strong> — Meaning: <em>${item.en.join(', ')}</em></li>`;
            });
            summaryHtml += '</ul>';
        }

        // --- DYNAMIC STUDY NOTES BASED ON SELECTED LESSON ---
        let notesHtml = "<div style='margin-top:20px; padding-top:15px; border-top:1px dashed #ccc; color:#555; font-size:14px; text-align:left;'>";
        notesHtml += "<b style='color:#2c3e50;'>💡 Teacher's Lesson Note:</b><br>";

        if (currentLesson === "1") {
            notesHtml += "• Pay attention to the difference between <b>せんせい (Sensei)</b> [used for others] and <b>きょうし (Kyoshi)</b> [used for your own profession].<br>• Country suffixes use <b>〜じん</b> for nationality and <b>〜ご</b> for language.";
        } else if (currentLesson === "2") {
            notesHtml += "• Remember the physical distance rules: <b>これ</b> (Near speaker), <b>それ</b> (Near listener), and <b>あれ</b> (Far from both).<br>• Use <b>この/その/あの</b> only when directly followed by a noun (e.g., このほん).";
        } else if (currentLesson === "3") {
            notesHtml += "• <b>ここ/そこ/あそこ</b> refer to physical places, while <b>こちら/そちら/あちら</b> are their polite, directional counterparts.<br>• Use <b>いくら</b> to ask for prices and count floors using <b>〜かい / 〜がい</b>.";
        } else if (currentLesson === "4") {
            notesHtml += "• Pay close attention to time counters. Hours use <b>〜じ</b> and minutes use <b>〜ふん / 〜ぷん</b>.<br>• Distinguish past and future reference words clearly: <b>きのう</b> (Yesterday) vs <b>あした</b> (Tomorrow).";
        } else if (currentLesson === "5") {
            notesHtml += "• <b>CRITICAL CALENDAR RULES:</b> Days 1 to 10 have irregular counts (ついたち, ふつか, みっか...). Memorize these separately!<br>• Also remember the irregular mid-month days: 14th (じゅうよっか), 20th (hatsuka), and 24th (にじゅうよっか).";
        } else if (currentLesson === "6") {
            notesHtml += "• Action verbs require the particle <b>を (o)</b> before them (e.g., パンを たべます).<br>• The phrase <b>いっしょに いかがですか</b> is a polite way to invite someone to join an activity.";
        } else if (currentLesson === "7") {
            notesHtml += "• This lesson focuses on tools and giving/receiving. Means or tools require the particle <b>で</b> (e.g., はしで たべます).<br>• Pay attention to direction: <b>あげます</b> (To give away) vs <b>もらいます</b> (To receive).";
        } else if (currentLesson === "8") {
            notesHtml += "• Japanese adjectives are divided into <b>い-adjectives</b> (ending in shared -i vowels like おおきい) and <b>な-adjectives</b> (like きれい, しずか).<br>• <b>きれい</b> looks like an i-adjective but it is strictly a な-adjective!";
        } else if (currentLesson === "9") {
            notesHtml += "• Preferences and abilities use the particle <b>が</b> instead of を (e.g., りょうりが すきです, 漢字が わかります).<br>• Use <b>どうして</b> to ask 'Why' and answer the sentence using the suffix <b>〜から</b> (because).";
        } else if (currentLesson === "10") {
            notesHtml += "• Existence verbs depend strictly on animacy: <b>あります</b> is for non-living objects/plants, while <b>います</b> is for living humans/animals.<br>• Position words follow the pattern: [Noun] の [うえ/した/なか/まえ/うしろ].";
        } else {
            notesHtml += "• Great job practicing multiple lessons! Keep reviewing the mixed target parameters to strengthen your vocabulary recall agility.";
        }
        
        notesHtml += "</div>";

        // Inject combined summary and custom notes into the UI block
        ul.innerHTML = summaryHtml + notesHtml;
    }

    document.getElementById("input-ans").addEventListener("keyup", function(e) {
        if (e.key === "Enter") { verifyInput(); }
    });

    resetQuizState();
</script>
